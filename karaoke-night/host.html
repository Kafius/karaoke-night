<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Karaoke — host console</title>
<style>
  :root { --bg:#0f0a1e; --card:#1c1530; --card2:#251a40; --line:#3a2c5c; --txt:#f3eefb; --mut:#b3a4d4; --acc:#a855f7; --acc2:#ec4899; --ok:#34d399; --warn:#f87171; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:radial-gradient(120% 90% at 50% 0%, #2a1850 0%, var(--bg) 60%); color:var(--txt); min-height:100vh; padding:20px 16px 60px; }
  .wrap { max-width:640px; margin:0 auto; }
  .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
  .top h1 { margin:0; font-size:22px; font-weight:800; }
  .top p { margin:2px 0 0; font-size:13px; color:var(--mut); }
  .reload { background:none; border:1px solid var(--line); color:var(--mut); border-radius:10px; padding:8px 14px; font-size:13px; cursor:pointer; }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:18px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; }
  .stat .l { font-size:12px; color:var(--mut); }
  .stat .v { font-size:24px; font-weight:800; margin-top:2px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:22px; }
  .card .ttl { font-size:14px; font-weight:700; margin:0 0 12px; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:10px; }
  input { width:100%; background:var(--card2); border:1px solid var(--line); border-radius:10px; padding:12px; color:var(--txt); font-size:15px; outline:none; }
  input:focus { border-color:var(--acc); }
  button.go { width:100%; border:none; border-radius:12px; padding:13px; font-size:15px; font-weight:700; color:#fff; background:linear-gradient(90deg,var(--acc),var(--acc2)); cursor:pointer; }
  .msg { text-align:center; font-size:13px; min-height:16px; margin-top:8px; font-weight:600; }
  h2.qh { font-size:18px; font-weight:700; margin:0 0 12px; }
  .item { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin-bottom:9px; }
  .ar { display:flex; flex-direction:column; gap:1px; }
  .ar button { background:none; border:none; color:var(--mut); cursor:pointer; font-size:15px; line-height:1; padding:1px 4px; }
  .ar button:disabled { opacity:0.25; cursor:default; }
  .num { width:26px; height:26px; flex-shrink:0; border-radius:50%; background:linear-gradient(135deg,var(--acc),var(--acc2)); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; }
  .meta { flex:1; min-width:0; }
  .meta .t { font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta .a { color:var(--mut); font-weight:400; }
  .meta .s { font-size:12px; color:var(--mut); margin-top:1px; }
  .act { background:none; border:1px solid var(--line); color:var(--mut); border-radius:8px; padding:6px 9px; font-size:14px; cursor:pointer; }
  .act:active { transform:scale(0.95); }
  .done { opacity:0.5; }
  .done .t { text-decoration:line-through; }
  .ck-on { color:var(--ok); border-color:var(--ok); }
  .edit { background:var(--card2); border:1px solid var(--acc); border-radius:12px; padding:12px; margin-bottom:9px; }
  .edit .g { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
  .edit input { font-size:14px; padding:10px; }
  .ebtns { display:flex; gap:8px; justify-content:flex-end; }
  .ebtns button { border-radius:9px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--line); background:none; color:var(--mut); }
  .ebtns .save { background:linear-gradient(90deg,var(--acc),var(--acc2)); border:none; color:#fff; }
  .empty { text-align:center; color:var(--mut); font-size:14px; padding:24px; border:1px dashed var(--line); border-radius:14px; }
  .clear { display:block; margin:18px auto 0; background:none; border:1px solid var(--warn); color:var(--warn); border-radius:10px; padding:8px 16px; font-size:13px; cursor:pointer; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>🎛️ Host console</h1>
      <p>Manage the live queue</p>
    </div>
    <button class="reload" id="reload">↻ Refresh</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="l">In queue</div><div class="v" id="s-wait">0</div></div>
    <div class="stat"><div class="l">Sung</div><div class="v" id="s-done">0</div></div>
    <div class="stat"><div class="l">Total</div><div class="v" id="s-total">0</div></div>
  </div>

  <div class="card">
    <p class="ttl">+ Add a song</p>
    <div class="grid3">
      <input id="a-singer" placeholder="Singer" autocomplete="off" />
      <input id="a-song" placeholder="Song title" autocomplete="off" />
      <input id="a-artist" placeholder="Artist (optional)" autocomplete="off" />
    </div>
    <button class="go" id="add">Add to queue</button>
    <div class="msg" id="amsg"></div>
  </div>

  <h2 class="qh">Queue</h2>
  <div id="list"></div>
  <button class="clear" id="clear">Clear entire queue</button>
</div>

<script>
  var API = '/api/queue';
  var editing = null;
  function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  function render(list){
    var wait = list.filter(function(x){return !x.done;}).length;
    document.getElementById('s-wait').textContent = wait;
    document.getElementById('s-done').textContent = list.length - wait;
    document.getElementById('s-total').textContent = list.length;
    var box = document.getElementById('list');
    if(!list.length){ box.innerHTML = '<div class="empty">Queue is empty.</div>'; return; }
    box.innerHTML = list.map(function(x,i){
      if(editing === x.id){
        return '<div class="edit">'
          + '<div class="g">'
            + '<input id="e-singer" value="'+esc(x.singer)+'" placeholder="Singer">'
            + '<input id="e-song" value="'+esc(x.song)+'" placeholder="Song">'
            + '<input id="e-artist" value="'+esc(x.artist)+'" placeholder="Artist">'
          + '</div>'
          + '<div class="ebtns">'
            + '<button data-act="cancel" data-id="'+x.id+'">Cancel</button>'
            + '<button class="save" data-act="save" data-id="'+x.id+'">Save</button>'
          + '</div>'
        + '</div>';
      }
      return '<div class="item '+(x.done?'done':'')+'">'
        + '<div class="ar">'
          + '<button data-act="up" data-id="'+x.id+'" '+(i===0?'disabled':'')+'>▲</button>'
          + '<button data-act="down" data-id="'+x.id+'" '+(i===list.length-1?'disabled':'')+'>▼</button>'
        + '</div>'
        + '<div class="num">'+(i+1)+'</div>'
        + '<div class="meta">'
          + '<div class="t">'+esc(x.song)+(x.artist?' <span class="a">· '+esc(x.artist)+'</span>':'')+'</div>'
          + '<div class="s">🎤 '+esc(x.singer)+'</div>'
        + '</div>'
        + '<button class="act '+(x.done?'ck-on':'')+'" data-act="done" data-id="'+x.id+'" title="Mark sung">✓</button>'
        + '<button class="act" data-act="edit" data-id="'+x.id+'" title="Edit">✎</button>'
        + '<button class="act" data-act="del" data-id="'+x.id+'" title="Remove">🗑</button>'
      + '</div>';
    }).join('');
  }

  function load(){ fetch(API).then(function(r){return r.json();}).then(render).catch(function(){}); }

  function api(method, payload){
    return fetch(API, { method:method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload||{}) })
      .then(function(r){return r.json();}).then(render).catch(function(){});
  }

  document.getElementById('add').addEventListener('click', function(){
    var singer=document.getElementById('a-singer').value.trim();
    var song=document.getElementById('a-song').value.trim();
    var artist=document.getElementById('a-artist').value.trim();
    var msg=document.getElementById('amsg');
    if(!singer||!song){ msg.style.color='#f87171'; msg.textContent='Add a singer and a song.'; return; }
    api('POST',{singer:singer,song:song,artist:artist}).then(function(){
      document.getElementById('a-singer').value=''; document.getElementById('a-song').value=''; document.getElementById('a-artist').value='';
      msg.style.color='#34d399'; msg.textContent='✓ Added.'; setTimeout(function(){msg.textContent='';},3000);
    });
  });

  document.getElementById('reload').addEventListener('click', load);

  document.getElementById('clear').addEventListener('click', function(){
    if(confirm('Clear the entire queue? This cannot be undone.')) api('DELETE',{all:true});
  });

  document.getElementById('list').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-act]'); if(!btn || btn.disabled) return;
    var id = btn.getAttribute('data-id'), act = btn.getAttribute('data-act');

    if(act==='edit'){ editing=id; fetch(API).then(function(r){return r.json();}).then(render); return; }
    if(act==='cancel'){ editing=null; load(); return; }
    if(act==='save'){
      var s=document.getElementById('e-singer').value.trim();
      var so=document.getElementById('e-song').value.trim();
      var ar=document.getElementById('e-artist').value.trim();
      if(!s||!so) return;
      editing=null; api('PATCH',{id:id,singer:s,song:so,artist:ar}); return;
    }
    if(act==='del'){ if(editing===id) editing=null; api('DELETE',{id:id}); return; }
    if(act==='done'){
      fetch(API).then(function(r){return r.json();}).then(function(list){
        var it=list.find(function(x){return x.id===id;}); if(it) api('PATCH',{id:id,done:!it.done});
      });
      return;
    }
    if(act==='up' || act==='down'){
      fetch(API).then(function(r){return r.json();}).then(function(list){
        var idx=list.findIndex(function(x){return x.id===id;});
        var j = act==='up'? idx-1 : idx+1;
        if(j<0||j>=list.length) return;
        var ids=list.map(function(x){return x.id;});
        var t=ids[idx]; ids[idx]=ids[j]; ids[j]=t;
        api('PATCH',{action:'reorder',order:ids});
      });
      return;
    }
  });

  load();
  setInterval(function(){ if(!editing) load(); }, 6000);
</script>
</body>
</html>
